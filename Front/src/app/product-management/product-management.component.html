<!-- Tabs navs -->
<ul class="nav nav-tabs nav-fill mb-3" id="ex1" role="tablist">
  <li class="nav-item" role="presentation" (click)="changePageToDashboard()">
    <a
      class="nav-link"
      id="ex2-tab-1"
      data-mdb-toggle="tab"
      href="#ex2-tabs-1"
      role="tab"
      aria-controls="ex2-tabs-1"
      aria-selected="true"
      >Dashboard</a
    >
  </li>
  <li class="nav-item" role="presentation">
    <a
      class="nav-link active"
      id="ex2-tab-2"
      data-mdb-toggle="tab"
      href="#ex2-tabs-2"
      role="tab"
      aria-controls="ex2-tabs-2"
      aria-selected="false"
      >Manage products</a
    >
  </li>
  <li class="nav-item" role="presentation" (click)="changePageToOrders()">
    <a
      class="nav-link"
      id="ex2-tab-3"
      data-mdb-toggle="tab"
      href="#ex2-tabs-3"
      role="tab"
      aria-controls="ex2-tabs-3"
      aria-selected="false"
      >Orders</a
    >
  </li>
</ul>
<!-- Tabs navs -->

<!-- Tabs content -->
<div class="tab-content" id="ex2-content">
  <div
    class="tab-pane fade"
    id="ex2-tabs-1"
    role="tabpanel"
    aria-labelledby="ex2-tab-1"
  >
  </div>
  <div
    class="tab-pane fade show active"
    id="ex2-tabs-2"
    role="tabpanel"
    aria-labelledby="ex2-tab-2"
  >
    <section id="section-productmanagement">
      <div id="black-opacity"></div>
      <div class="parent-card">
          <div class="for-card" *ngFor = "let myProduct of apiService.myProducts">
            <div class="card child-card">
              <img src="{{myProduct.image}}" style="width:100%;" class="card-img-top"/>
              <div class="card-body">
                <h5 class="card-title">{{myProduct.name}}</h5>
                <div class="card-text">
                  <form (ngSubmit)="submitForm($event)" action="">
                    <div class="form-group">
                      <input type="hidden" name="_id" value="{{myProduct._id}}">
                      <div class="form-outline mb-4">
                        <input type="text" name="name" value="{{myProduct.name}}" id=" form1Example1" class="form-control active"/>
                        <label class="form-label" for="form1Example1">Name</label>
                      </div>

                      <label for="type-select">Choose a type:</label>
                      <label class="visually-hidden" for="inlineFormSelectPref">Preference</label>
                      <select name="productTypeId" class="select" style="width: 100%;">
                        <option value="">--Please choose an option--</option>
                        <ng-container *ngFor = "let productType of apiService.allProductTypes;">
                          <ng-container *ngIf="myProduct.productTypeId._id === productType._id; then thenBlock else elseBlock"></ng-container>
                            <ng-template #thenBlock><option value="{{productType._id}}" selected>{{productType.name}}</option></ng-template>
                            <ng-template #elseBlock><option value="{{productType._id}}">{{productType.name}}</option></ng-template>
                        </ng-container>
                      </select>
                      <br>
                      <br>

                      <div class="form-outline mb-4">
                        <input type="text" name="description" value="{{myProduct.description}}" id=" form1Example1" class="form-control active"/>
                        <label class="form-label" for="form1Example1">Description</label>
                      </div>
                      
                      <div class="form-outline mb-4">
                        <input type="text" name="price" value="{{myProduct.price}}" id=" form1Example1" class="form-control active"/>
                        <label class="form-label" for="form1Example1">Price</label>
                      </div>
                      
                      <div style="display:flex;justify-content: center;flex-direction:row;">
                        <ng-container *ngFor = "let productWithSize of myProduct.productWithSizes;">
                          <span style="margin-right:5%;">{{productWithSize.productSizeId.name}}</span>
                        </ng-container>
                      </div>
                      <div style="display:flex;justify-content: center;flex-direction:row;align-items: center;">
                        <ng-container *ngFor = "let productSize of apiService.allProductSizes;">
                          <input class="form-check-input" style="margin:0!important;" type="checkbox" name="productSizes" value="{{productSize._id}}" id="inlineFormCheck"/>
                          <span>
                            {{productSize.name}}
                          </span>
                        </ng-container>
                      </div>
                    </div>
                    <div style="display:flex;justify-content: center;flex-direction:row;">
                      <button type="submit" class="btn btn-primary" (click)="updateProduct()">Update</button>
                      <button type="submit" class="btn btn-danger" (click)="deleteProduct()">Delete</button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
      </div>
      <div style="position:relative;z-index:11;display:flex;justify-content:center;padding-top:3%;padding-bottom:3%;">
        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#createProductModal">
        Add Product
        </button>
      </div>
    </section>
    
      
    <div class="modal fade" id="createProductModal" tabindex="-1" role="dialog" aria-labelledby="createProductModalLabel" aria-hidden="true">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <form (ngSubmit)="addProduct($event)" action="">
            <div class="modal-header">
              <h5 class="modal-title" id="createProductModalLabel">Modal title</h5>
              <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                <span aria-hidden="true">&times;</span>
              </button>
            </div>
            <div class="modal-body">
              <label>Name :</label>
              <input type="text" name="name">
              <br>
              <label>Description :</label>
              <input type="text" name="description">
              <br>
              <label>Price :</label>
              <input type="text" name="price">
              <br>
              <label>Product Type :</label>
              <select name="productTypeId">
                <option value="">--Please choose an option--</option>
                <ng-container *ngFor = "let productType of apiService.allProductTypes;">
                  <option value="{{productType._id}}">{{productType.name}}</option>
                </ng-container>
              </select>
              <br>
              <label>Product Sizes :</label>
              <ng-container *ngFor = "let productSize of apiService.allProductSizes;">
                <input type="checkbox" name="productSizes" value="{{productSize._id}}">
                <label>{{productSize.name}}</label>
              </ng-container>
              <br>
              <label>Image :</label>
              <input class="form-control" #fileInput type="file" (change)="onChange($event)">
              <br>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
              <button type="submit" class="btn btn-primary">Add</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  <div
    class="tab-pane fade"
    id="ex2-tabs-3"
    role="tabpanel"
    aria-labelledby="ex2-tab-3"
  >
  
</div>
<!-- Tabs content -->
