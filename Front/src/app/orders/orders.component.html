<!-- Tabs navs -->
<ul class="nav nav-tabs nav-fill mb-3" id="ex1" role="tablist">
  <li class="nav-item" role="presentation" (click)="changePageToDashboard()">
    <a
      class="nav-link"
      id="ex2-tab-1"
      data-mdb-toggle="tab"
      href="#ex2-tabs-1"
      role="tab"
      aria-controls="ex2-tabs-1"
      aria-selected="true"
      >Dashboard</a
    >
  </li>
  <li class="nav-item" role="presentation" (click)="changePageToProductManagement()">
    <a
      class="nav-link"
      id="ex2-tab-2"
      data-mdb-toggle="tab"
      href="#ex2-tabs-2"
      role="tab"
      aria-controls="ex2-tabs-2"
      aria-selected="false"
      >Manage products</a
    >
  </li>
  <li class="nav-item" role="presentation">
    <a
      class="nav-link active"
      id="ex2-tab-3"
      data-mdb-toggle="tab"
      href="#ex2-tabs-3"
      role="tab"
      aria-controls="ex2-tabs-3"
      aria-selected="false"
      >Orders</a
    >
  </li>
</ul>
<!-- Tabs navs -->

<!-- Tabs content -->
<div class="tab-content" id="ex2-content">
  <div
    class="tab-pane fade"
    id="ex2-tabs-1"
    role="tabpanel"
    aria-labelledby="ex2-tab-1"
  >
  </div>
  <div
    class="tab-pane fade"
    id="ex2-tabs-2"
    role="tabpanel"
    aria-labelledby="ex2-tab-2"
  >
  </div>
  <div
    class="tab-pane fade show active"
    id="ex2-tabs-3"
    role="tabpanel"
    aria-labelledby="ex2-tab-3"
  >
  <section id="section-orders">
    <ng-container *ngFor = "let order of apiService.orders; let i = index;">
      <div class="row">
        <div class="col" style="display: flex;justify-content: center;align-items: center;flex-direction:column;">
          <span>Order n°{{order._id}}</span>
          <span>Total price : {{order.total_price}} €</span>
          <span>Date : {{order.created_at}}</span>
        </div>
        <div class="col">
          <a
            data-mdb-toggle="collapse"
            href="#order{{order._id}}"
            role="button"
            [attr.aria-expanded]="false"
            [attr.aria-controls]="order._id"
            (click)="changeArrowIcon(i)"
            style="display:flex;justify-content:center;align-items:center;"
          >
          <i class="fa-solid fa-angles-down" style="font-size:1.5em;border:1px solid;border-radius:50%;padding:1em;"></i>
          </a>
          <ng-container *ngFor = "let orderDetail of order.orderDetails">
            <ng-container *ngIf="orderDetail.product; then thenBlock"></ng-container>
            <ng-template #thenBlock>
              
              <div class="collapse mt-3" id="order{{order._id}}">
                <div class="row">
                  <div class="col" style="display:flex;justify-content:center;align-items:center;">
                    <img src="{{orderDetail.product.image}}"
                    class="rounded-circle"
                    width="100"
                    height="100"
                    loading="lazy"
                    style="object-fit: cover;">
                  </div>
                  <div class="col">
                    <p>Name : {{orderDetail.product.name}}</p>
                    <p>Quantity : {{orderDetail.quantity}}</p>
                    <p>Size : {{orderDetail.productSize.name}}</p>
                    <p>Price : {{orderDetail.price}} €</p>
                  </div>
                </div>
                <hr>
              </div>
              
            </ng-template>
            
          </ng-container>
        </div>
      </div>
      <hr>
    </ng-container>
  </section>
  </div>
</div>
<!-- Tabs content -->
